name: Autograding

on:
  push:
    branches: [ "**" ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: sudo apt-get install -y gcc

      # ── Archivos generados ─────────────────────────────────────

      - name: "1. programa.i existe"
        id: t1
        continue-on-error: true
        run: test -f programa.i

      - name: "2. No hay #define en programa.i (macros expandidas)"
        id: t2
        continue-on-error: true
        run: test -f programa.i && ! grep -q '^#define' programa.i

      - name: "3. VERSION expandido a '1.0' en programa.i"
        id: t3
        continue-on-error: true
        run: grep -q '"1\.0"' programa.i

      - name: "4. CUADRADO(LIMITE) expandido a ((5) * (5)) en programa.i"
        id: t4
        continue-on-error: true
        run: grep -qF '((5) * (5))' programa.i

      - name: "5. Comentarios eliminados de programa.i"
        id: t5
        continue-on-error: true
        run: "! grep -q 'Archivo fuente principal' programa.i"

      - name: "6. programa.i incluye headers completos (>500 lineas)"
        id: t6
        continue-on-error: true
        run: test $(wc -l < programa.i) -gt 500

      - name: "7. programa.s existe"
        id: t7
        continue-on-error: true
        run: test -f programa.s

      - name: "8. sumar definida en programa.s"
        id: t8
        continue-on-error: true
        run: grep -qE '^(sumar|_sumar):' programa.s

      - name: "9. area_circulo llamada pero no definida en programa.s"
        id: t9
        continue-on-error: true
        run: grep -q 'area_circulo' programa.s && ! grep -qE '^(area_circulo|_area_circulo):' programa.s

      - name: "10. nm_programa_o.txt tiene area_circulo como U (indefinido)"
        id: t10
        continue-on-error: true
        run: test -f salidas/nm_programa_o.txt && grep -qE 'U.*(area_circulo|_area_circulo)' salidas/nm_programa_o.txt

      - name: "11. nm_ejecutable.txt tiene area_circulo como T (resuelto)"
        id: t11
        continue-on-error: true
        run: test -f salidas/nm_ejecutable.txt && grep -qE 'T.*(area_circulo|_area_circulo)' salidas/nm_ejecutable.txt

      - name: "12. salida_debug.txt contiene [DEBUG]"
        id: t12
        continue-on-error: true
        run: test -f salidas/salida_debug.txt && grep -q '\[DEBUG\]' salidas/salida_debug.txt

      - name: "13. Los fuentes compilan y producen factorial(5)=120"
        id: t13
        continue-on-error: true
        run: gcc -Wall programa.c matematica.c -o programa_ci && ./programa_ci | grep -q '120'

      - name: "14. programa.o NO esta commiteado"
        id: t14
        continue-on-error: true
        run: "! test -f programa.o"

      # ── Respuestas cerradas de proceso_compilacion.md ──────────

      - name: "R1. Respuesta: LINEAS_I es un numero de 3 o 4 digitos"
        id: r1
        continue-on-error: true
        run: grep -qE '^LINEAS_I=[0-9]{3,4}$' proceso_compilacion.md

      - name: "R2. Respuesta: CUADRADO_EN_I=NO"
        id: r2
        continue-on-error: true
        run: grep -qiE '^CUADRADO_EN_I=NO$' proceso_compilacion.md

      - name: "R3. Respuesta: NOMBRE_MACRO_VERSION=VERSION"
        id: r3
        continue-on-error: true
        run: grep -qE '^NOMBRE_MACRO_VERSION=VERSION$' proceso_compilacion.md

      - name: "R4. Respuesta: COMENTARIOS_EN_I=NO"
        id: r4
        continue-on-error: true
        run: grep -qiE '^COMENTARIOS_EN_I=NO$' proceso_compilacion.md

      - name: "R5. Respuesta: DEBUG_ACTIVA_CODIGO=SI"
        id: r5
        continue-on-error: true
        run: grep -qiE '^DEBUG_ACTIVA_CODIGO=SI$' proceso_compilacion.md

      - name: "R6. Respuesta: AREA_EN_S=LLAMADA"
        id: r6
        continue-on-error: true
        run: grep -qiE '^AREA_EN_S=LLAMADA$' proceso_compilacion.md

      - name: "R7. Respuesta: LLAMADAS_EN_S=SI"
        id: r7
        continue-on-error: true
        run: grep -qiE '^LLAMADAS_EN_S=SI$' proceso_compilacion.md

      - name: "R8. Respuesta: TIPO_AREA_EN_O=U"
        id: r8
        continue-on-error: true
        run: grep -qE '^TIPO_AREA_EN_O=U$' proceso_compilacion.md

      - name: "R9. Respuesta: ETAPA_QUE_RESUELVE=ENLAZADO"
        id: r9
        continue-on-error: true
        run: grep -qiE '^ETAPA_QUE_RESUELVE=ENLAZADO$' proceso_compilacion.md

      - name: "R10. Respuesta: EJECUTABLE_O=NO"
        id: r10
        continue-on-error: true
        run: grep -qiE '^EJECUTABLE_O=NO$' proceso_compilacion.md

      - name: "R11. Respuesta: TIPO_AREA_ENLAZADO=T"
        id: r11
        continue-on-error: true
        run: grep -qE '^TIPO_AREA_ENLAZADO=T$' proceso_compilacion.md

      - name: "R12. Respuesta: SIMBOLOS_U_FINAL=SI"
        id: r12
        continue-on-error: true
        run: grep -qiE '^SIMBOLOS_U_FINAL=SI$' proceso_compilacion.md

      - name: "R13. Respuesta: FACTORIAL_5=120"
        id: r13
        continue-on-error: true
        run: grep -qE '^FACTORIAL_5=120$' proceso_compilacion.md

      # ── Puntaje final ──────────────────────────────────────────
      - name: Calcular puntaje
        if: always()
        run: |
          pts() { [ "$1" = "success" ] && echo "$2" || echo 0; }
          row() { [ "$2" = "success" ] && echo "| $1 | ✅ | $3 / $3 |" || echo "| $1 | ❌ | 0 / $3 |"; }

          SCORE=0
          SCORE=$((SCORE + $(pts "${{ steps.t1.outcome }}"  2)))
          SCORE=$((SCORE + $(pts "${{ steps.t2.outcome }}"  3)))
          SCORE=$((SCORE + $(pts "${{ steps.t3.outcome }}"  3)))
          SCORE=$((SCORE + $(pts "${{ steps.t4.outcome }}"  3)))
          SCORE=$((SCORE + $(pts "${{ steps.t5.outcome }}"  2)))
          SCORE=$((SCORE + $(pts "${{ steps.t6.outcome }}"  2)))
          SCORE=$((SCORE + $(pts "${{ steps.t7.outcome }}"  2)))
          SCORE=$((SCORE + $(pts "${{ steps.t8.outcome }}"  3)))
          SCORE=$((SCORE + $(pts "${{ steps.t9.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.t10.outcome }}" 4)))
          SCORE=$((SCORE + $(pts "${{ steps.t11.outcome }}" 4)))
          SCORE=$((SCORE + $(pts "${{ steps.t12.outcome }}" 3)))
          SCORE=$((SCORE + $(pts "${{ steps.t13.outcome }}" 5)))
          SCORE=$((SCORE + $(pts "${{ steps.t14.outcome }}" 2)))
          SCORE=$((SCORE + $(pts "${{ steps.r1.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.r2.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.r3.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.r4.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.r5.outcome }}"  5)))
          SCORE=$((SCORE + $(pts "${{ steps.r6.outcome }}"  5)))
          SCORE=$((SCORE + $(pts "${{ steps.r7.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.r8.outcome }}"  5)))
          SCORE=$((SCORE + $(pts "${{ steps.r9.outcome }}"  4)))
          SCORE=$((SCORE + $(pts "${{ steps.r10.outcome }}" 4)))
          SCORE=$((SCORE + $(pts "${{ steps.r11.outcome }}" 4)))
          SCORE=$((SCORE + $(pts "${{ steps.r12.outcome }}" 5)))
          SCORE=$((SCORE + $(pts "${{ steps.r13.outcome }}" 6)))

          {
            echo "## Puntaje: $SCORE / 100"
            echo ""
            echo "| Test | Resultado | Puntos |"
            echo "|------|:---------:|-------:|"
            row "1. programa.i existe"                          "${{ steps.t1.outcome }}"  2
            row "2. No hay #define en programa.i"               "${{ steps.t2.outcome }}"  3
            row "3. VERSION expandido a '1.0'"                  "${{ steps.t3.outcome }}"  3
            row "4. CUADRADO(LIMITE) expandido"                 "${{ steps.t4.outcome }}"  3
            row "5. Comentarios eliminados"                     "${{ steps.t5.outcome }}"  2
            row "6. Headers completos (>500 líneas)"            "${{ steps.t6.outcome }}"  2
            row "7. programa.s existe"                          "${{ steps.t7.outcome }}"  2
            row "8. sumar definida en programa.s"               "${{ steps.t8.outcome }}"  3
            row "9. area_circulo no definida en .s"             "${{ steps.t9.outcome }}"  4
            row "10. area_circulo U en nm_programa_o.txt"       "${{ steps.t10.outcome }}" 4
            row "11. area_circulo T en nm_ejecutable.txt"       "${{ steps.t11.outcome }}" 4
            row "12. [DEBUG] en salida_debug.txt"               "${{ steps.t12.outcome }}" 3
            row "13. Compila y factorial(5)=120"                "${{ steps.t13.outcome }}" 5
            row "14. programa.o no commiteado"                  "${{ steps.t14.outcome }}" 2
            row "R1. LINEAS_I (3-4 dígitos)"                   "${{ steps.r1.outcome }}"  4
            row "R2. CUADRADO_EN_I=NO"                         "${{ steps.r2.outcome }}"  4
            row "R3. NOMBRE_MACRO_VERSION=VERSION"              "${{ steps.r3.outcome }}"  4
            row "R4. COMENTARIOS_EN_I=NO"                      "${{ steps.r4.outcome }}"  4
            row "R5. DEBUG_ACTIVA_CODIGO=SI"                   "${{ steps.r5.outcome }}"  5
            row "R6. AREA_EN_S=LLAMADA"                        "${{ steps.r6.outcome }}"  5
            row "R7. LLAMADAS_EN_S=SI"                         "${{ steps.r7.outcome }}"  4
            row "R8. TIPO_AREA_EN_O=U"                         "${{ steps.r8.outcome }}"  5
            row "R9. ETAPA_QUE_RESUELVE=ENLAZADO"              "${{ steps.r9.outcome }}"  4
            row "R10. EJECUTABLE_O=NO"                         "${{ steps.r10.outcome }}" 4
            row "R11. TIPO_AREA_ENLAZADO=T"                    "${{ steps.r11.outcome }}" 4
            row "R12. SIMBOLOS_U_FINAL=SI"                     "${{ steps.r12.outcome }}" 5
            row "R13. FACTORIAL_5=120"                         "${{ steps.r13.outcome }}" 6
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Puntaje final: $SCORE/100"
          [ "$SCORE" -ge 60 ] || exit 1
